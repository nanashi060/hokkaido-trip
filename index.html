<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>北海道旅行 2026 🗺️</title>
  <meta name="description" content="函館・小樽・札幌をめぐる4泊5日のふたり旅のしおり">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="site-nav">
    <a class="nav-logo" href="#top"><span data-icon="map"></span> 北海道旅行 2026</a>
    <div class="nav-links">
      <a href="#timeline"><span data-icon="calendar-days"></span> スケジュール</a>
      <a href="#map-section"><span data-icon="map"></span> マップ</a>
      <a href="#spots"><span data-icon="map-pin"></span> スポット</a>
    </div>
  </nav>

  <header class="hero" id="top">
    <div class="hero-floaters" aria-hidden="true">
      <span style="--d:0s;   --x:8%;  color:#2F6F8F" data-icon="plane"></span>
      <span style="--d:2.5s; --x:28%; color:#B6423E" data-icon="camera"></span>
      <span style="--d:1.2s; --x:48%; color:#A65A1F" data-icon="ice-cream-cone"></span>
      <span style="--d:3.8s; --x:68%; color:#1F7A83" data-icon="mountain-snow"></span>
      <span style="--d:0.8s; --x:86%; color:#6B5CA5" data-icon="beer"></span>
    </div>
    <div class="hero-enaga" role="img" aria-label="旅の相棒のシマエナガ">
      <svg class="shimaenaga" viewBox="0 0 180 130" aria-hidden="true">
        <path class="enaga-tail" d="M116 74 C148 69 168 82 174 104 C145 101 124 91 105 78 Z"/>
        <ellipse class="enaga-shadow" cx="85" cy="112" rx="48" ry="8"/>
        <ellipse class="enaga-body" cx="76" cy="72" rx="57" ry="43"/>
        <path class="enaga-wing left" d="M42 68 C22 73 15 88 18 102 C35 100 48 90 55 75 Z"/>
        <path class="enaga-wing right" d="M111 66 C130 70 141 84 140 98 C123 98 112 88 104 75 Z"/>
        <circle class="enaga-head" cx="72" cy="47" r="34"/>
        <circle class="enaga-eye" cx="58" cy="42" r="4"/>
        <circle class="enaga-eye" cx="87" cy="42" r="4"/>
        <path class="enaga-beak" d="M70 51 L78 55 L70 59 Z"/>
        <circle class="enaga-cheek" cx="48" cy="53" r="7"/>
        <circle class="enaga-cheek" cx="95" cy="53" r="7"/>
      </svg>
      <span>シマエナガも旅支度中</span>
    </div>
    <p class="hero-eyebrow">ふたりの旅のしおり</p>
    <h1 class="hero-title" id="hero-title">北海道旅行 2026</h1>
    <p class="hero-sub" id="hero-sub"></p>
    <p class="hero-dates" id="hero-dates"></p>
    <div class="countdown" id="countdown"></div>
    <div class="hero-waves" aria-hidden="true">
      <svg class="wave wave-back" viewBox="0 0 1440 90" preserveAspectRatio="none">
        <path d="M0,44 C200,20 420,72 640,58 C860,44 1080,76 1280,60 C1360,54 1400,48 1440,52 L1440,90 L0,90 Z"/>
      </svg>
      <svg class="wave wave-front" viewBox="0 0 1440 90" preserveAspectRatio="none">
        <path d="M0,58 C180,86 360,40 540,52 C720,64 900,30 1080,44 C1260,58 1350,72 1440,60 L1440,90 L0,90 Z"/>
      </svg>
    </div>
  </header>

  <main>
    <section class="section" id="timeline">
      <h2 class="section-title"><span data-icon="calendar-days"></span> 旅のスケジュール</h2>
      <div class="day-tabs" id="day-tabs" role="tablist"></div>
      <div class="day-header" id="day-header"></div>
      <div class="timeline-body" id="timeline-body"></div>
    </section>

    <section class="section" id="map-section">
      <h2 class="section-title"><span data-icon="map"></span> 旅のマップ</h2>
      <div class="map-filters" id="map-filters"></div>
      <div id="map"></div>
    </section>

    <section class="section" id="spots">
      <h2 class="section-title"><span data-icon="map-pin"></span> スポット図鑑</h2>
      <div class="spot-filters" id="spot-filters"></div>
      <div class="spot-grid" id="spot-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p><span data-icon="luggage"></span> いってらっしゃい!すてきな旅になりますように <span class="heart-beat" data-icon="heart"></span></p>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
